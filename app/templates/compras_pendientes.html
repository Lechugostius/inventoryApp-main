{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/pending.css">
{% endblock %}

{% block content %}
<div class="container-fluid p-4">

    <!-- Header -->
    <div class="card mb-4">
        <div class="card-header">
            <h2 class="mb-0 fs-4">
                <i class="fas fa-shopping-cart me-2"></i>Compras Pendientes
            </h2>
            <p class="mb-0 mt-1 small" style="color:rgba(255,255,255,0.7)">
                Productos con stock bajo que requieren atención
            </p>
        </div>
    </div>

    <!-- Tabs -->
    <div class="d-flex gap-4 mb-3" style="border-bottom:2px solid #ebebeb;">
        <button class="cp-tab active" id="tab-pending" onclick="switchTab('pending')">
            Pendientes <span id="badge-pending" class="cp-badge cp-badge-red">0</span>
        </button>
        <button class="cp-tab" id="tab-purchased" onclick="switchTab('purchased')">
            Realizados <span id="badge-purchased" class="cp-badge cp-badge-green">0</span>
        </button>
    </div>

    <!-- Panel Pendientes -->
    <div id="panel-pending">
        <div class="card">
            <div class="card-body p-0" id="container-pending">
                <div class="pending-spinner">
                    <div class="spinner-border spinner-border-sm me-2"></div>
                    <span style="color:#888">Cargando...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Panel Realizados -->
    <div id="panel-purchased" class="d-none">
        <div class="card">
            <div class="card-body p-0" id="container-purchased"></div>
        </div>
    </div>

</div>

<!-- Modal -->
<div id="confirm-modal" class="cp-modal-overlay d-none">
    <div class="cp-modal-box">
        <p class="cp-modal-title">
            <i class="fas fa-exclamation-triangle me-2" style="color:#ffc107"></i>¿Deshacer pedido?
        </p>
        <p id="modal-message" class="cp-modal-msg"></p>
        <div class="d-flex gap-2 justify-content-end">
            <button id="modal-cancel" class="cp-btn-cancel">Cancelar</button>
            <button id="modal-confirm" class="cp-btn-confirm">Sí, devolver</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/pending.js"></script>
{% endblock %}
