<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de Facturas - Taco Bell</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #5C1A8D; /* Fondo morado */
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            color: #FFFFFF;
            padding: 20px;
            border: 2px solid #FFA500; /* Borde naranja */
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
        }

        .logo {
            width: 100px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1rem;
            margin-bottom: 20px;
            background-color: #7A3FC9;
            padding: 10px 20px;
            border-radius: 25px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background-color: #7A3FC9;
            color: #FFFFFF;
            padding: 10px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background-color: #9A65D8;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="../static/images/TacoBell_Logo_Standard_White.png" alt="Logo Taco Bell" class="logo">
        <h1>Bienvenido, {{ user['name'] }}</h1>
        
    </div>
</body>
</html>
