<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Administrador de Facturas - Taco Bell{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/view.css">
    <style>
        /* Estilos solo para la pantalla de bienvenida (no afectan a las páginas hijas) */
        body.welcome-screen {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #5C1A8D; /* Fondo morado */
            font-family: Arial, sans-serif;
        }

        body.welcome-screen .container {
            text-align: center;
            color: #FFFFFF;
            padding: 20px;
            border: 2px solid #FFA500; /* Borde naranja */
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
        }

        body.welcome-screen .logo {
            width: 100px;
            margin-bottom: 10px;
        }

        body.welcome-screen h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        body.welcome-screen h2 {
            font-size: 1rem;
            margin-bottom: 20px;
            background-color: #7A3FC9;
            padding: 10px 20px;
            border-radius: 25px;
        }

        body.welcome-screen .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        body.welcome-screen .btn {
            background-color: #7A3FC9;
            color: #FFFFFF;
            padding: 10px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        body.welcome-screen .btn:hover {
            background-color: #9A65D8;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}welcome-screen{% endblock %}">
    {% block content %}
    <div class="container">
        <img src="/static/images/TacoBell_Logo_Standard_White.png" alt="Logo Taco Bell" class="logo">
        <h1>Bienvenido, {{ user['name'] if user else 'Usuario' }}</h1>
    </div>
    {% endblock %}

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
