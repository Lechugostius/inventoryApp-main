<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/login.css">
    <title>Login</title>
</head>
<body>
    <section class="gradient-form">
        <div class="container py-5">
            <div class="row d-flex justify-content-center">
                <div class="col-xl-10">
                    <div class="card rounded-4 shadow">
                        <div class="row g-0">
                            <div class="col-lg-6">
                                <div class="card-body p-md-5 mx-md-4">
                                    <div class="text-center logo-container animate__animated animate__fadeIn">
                                        <img src="../static/images/logo.png" class="logo-img" style="width: 185px;" alt="logo">
                                        <h4 class="mt-4 mb-4">Inventary Manager</h4>
                                    </div>
                                    <div class="text-center mt-5 animate__animated animate__fadeInUp">
                                        <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg">
                                            Acceder
                                        </a>
                                    </div>
                                    {% with messages = get_flashed_messages(with_categories=true) %}
                                        {% if messages %}
                                            {% for category, message in messages %}
                                                <div class="alert alert-{{ category }} mt-4 animate__animated animate__fadeIn">{{ message }}</div>
                                            {% endfor %}
                                        {% endif %}
                                    {% endwith %}
                                </div>
                            </div>
                            <div class="col-lg-6 gradient-custom-2">
                                <div class="decorative-pattern"></div>
                                <div class="animated-bg"></div>
                                <div class="welcome-text animate__animated animate__fadeIn">
                                    <svg class="welcome-icon" viewBox="0 0 24 24" fill="white">
                                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.88-11.71L10 14.17l-1.88-1.88a.996.996 0 1 0-1.41 1.41l2.59 2.59c.39.39 1.02.39 1.41 0L17.3 9.7a.996.996 0 1 0-1.41-1.41z"/>
                    </svg>
                                    <h4>We are more than <br>just a company</h4>
                                    <div class="livemas-container">
                                        <img src="../static/images/livemas.png" class="logo-img" alt="Live Más">
                                    </div>
                                </div>
                                <div class="decorative-border"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
